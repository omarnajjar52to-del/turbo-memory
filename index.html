<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fabyab Group | جودة تستحق الاختيار</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#020BFE;
    --blue2:#4361FF;
    --green:#5AF400;
    --navy:#010445;
    --navy2:#00072e;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{ scroll-behavior:smooth; }
  body{
    background:var(--navy);
    color:#fff;
    font-family:'Manrope','Tajawal',-apple-system,sans-serif;
    overflow-x:hidden;
  }
  [dir="rtl"] body{ font-family:'Tajawal','Manrope',sans-serif; }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.01ms !important; transition-duration:.01ms !important;}
  }

  /* ================= LOADER (white) ================= */
  #loader{
    position:fixed; inset:0; z-index:9999;
    background:#ffffff;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .ld-inner{ position:relative; z-index:2; text-align:center; }
  .ld-inner svg{ width:min(30vw,120px); height:auto; }
  .ld-bar{ width:180px; height:2px; background:rgba(2,4,60,.1); margin:22px auto 0; overflow:hidden; border-radius:2px; opacity:0; animation:fadeIn .5s .8s forwards; }
  .ld-fill{ height:100%; width:0%; background:linear-gradient(90deg,var(--blue2),var(--green)); }
  .ld-pct{ margin-top:10px; font-size:11px; letter-spacing:3px; color:rgba(2,4,60,.4); opacity:0; animation:fadeIn .5s .9s forwards; font-weight:700; }
  @keyframes fadeIn{ to{ opacity:1; } }
  #loader.hide{ opacity:0; visibility:hidden; transition:opacity .7s ease, visibility .7s ease; }

  /* ================= SVG LINE-DRAW ANIMATION (shared by loader + hero) ================= */
  .mark .bar{
    opacity:0;
    transform-box:fill-box;
    transform-origin:center;
    transform:scale(.35);
    animation:barIn .6s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes barIn{ to{ opacity:1; transform:scale(1); } }

  /* ================= NAV ================= */
  header.site{
    position:fixed; top:0; left:0; right:0; z-index:500;
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 22px; padding-top:max(20px, env(safe-area-inset-top));
    transition:background .5s cubic-bezier(.16,1,.3,1), padding .4s ease, border-color .4s ease;
    border-bottom:1px solid transparent;
  }
  header.site .brand{ display:flex; align-items:center; gap:9px; font-weight:800; font-size:14px; letter-spacing:.04em; color:var(--navy); transition:color .4s ease; }
  header.site .brand .sq{ width:9px;height:9px;border-radius:2px; background:linear-gradient(135deg,var(--blue2),var(--green)); }
  header.site .navdots{ display:flex; gap:7px; }
  header.site .navdots span{ width:7px;height:7px;border-radius:50%; background:rgba(2,4,60,.18); transition:background .35s ease, transform .35s ease, box-shadow .35s ease; cursor:pointer; }
  header.site .navdots span.on{ background:linear-gradient(135deg,var(--blue2),var(--green)); transform:scale(1.35); box-shadow:0 0 10px rgba(90,244,0,.5); }
  header.site.solid{
    background:rgba(1,4,69,.8);
    backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    padding:13px 22px;
    border-bottom-color:rgba(255,255,255,.08);
  }
  header.site.solid .brand{ color:#fff; }
  header.site.solid .navdots span{ background:rgba(255,255,255,.22); }
  header.site.solid .navdots span.on{ background:linear-gradient(135deg,var(--blue2),var(--green)); }

  .scrollbar{ position:fixed; top:0; left:0; right:0; height:2px; z-index:499; background:rgba(2,4,60,.06); }
  .scrollbar i{ display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--blue2),var(--green)); box-shadow:0 0 8px rgba(90,244,0,.5); }

  /* ================= HERO — WHITE ================= */
  #hero{
    position:relative;
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow:hidden;
    background:#ffffff;
    padding:110px 24px 60px;
  }
  #hero .tint{
    position:absolute; border-radius:50%; filter:blur(90px); opacity:.16; pointer-events:none;
  }
  #hero .tintA{ width:460px;height:460px; background:var(--blue2); top:-16%; left:-14%; animation:heroOrb 13s ease-in-out infinite alternate; }
  #hero .tintB{ width:360px;height:360px; background:var(--green); bottom:-16%; right:-12%; opacity:.14; animation:heroOrb 16s ease-in-out infinite alternate-reverse; }
  @keyframes heroOrb{ to{ transform:translate(36px,-26px) scale(1.1); } }

  .hero-inner{ position:relative; z-index:3; text-align:center; }
  .hero-mark-wrap{
    opacity:0;
    transform:translateY(30px);
    animation:markWrapIn .8s ease .1s forwards;
  }
  @keyframes markWrapIn{ to{ opacity:1; transform:translateY(0); } }
  .hero-mark-wrap svg{
    width:min(48vw,210px);
    display:block; margin:0 auto;
    filter:drop-shadow(0 16px 34px rgba(2,11,254,.18));
  }

  .hero-word{
    margin-top:18px;
    opacity:0;
    animation:fadeIn .7s 1.35s forwards;
  }
  .hero-word .w1{ color:var(--blue); font-weight:800; font-size:clamp(22px,4vw,30px); letter-spacing:.02em; }
  .hero-word .w2{ color:#18b7e0; font-weight:800; font-size:clamp(22px,4vw,30px); letter-spacing:.02em; }
  .hero-word .sub{ display:block; margin-top:4px; color:var(--navy); opacity:.65; font-size:12px; font-weight:600; letter-spacing:.04em; }

  .hero-line{
    width:0; height:2px;
    background:linear-gradient(90deg,var(--blue2),var(--green));
    margin:26px auto 0; border-radius:2px;
    animation:lineGrow 1s cubic-bezier(.16,1,.3,1) 1.55s forwards;
  }
  @keyframes lineGrow{ to{ width:110px; } }

  .hero-tag{
    margin-top:24px;
    font-size:clamp(16px,2.6vw,20px);
    font-weight:800;
    color:var(--navy);
    opacity:0; transform:translateY(16px);
    animation:riseFade .9s cubic-bezier(.16,1,.3,1) 1.7s forwards;
  }
  .hero-tag-en{
    margin-top:8px;
    font-size:11px;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:rgba(2,4,60,.42);
    opacity:0; transform:translateY(16px);
    animation:riseFade .9s cubic-bezier(.16,1,.3,1) 1.85s forwards;
  }
  @keyframes riseFade{ to{ opacity:1; transform:translateY(0); } }

  .hero-scroll{
    position:absolute; bottom:34px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:8px;
    opacity:0; animation:fadeIn .8s 2.2s forwards;
  }
  .hero-scroll span{ font-size:10px; letter-spacing:.24em; color:rgba(2,4,60,.4); text-transform:uppercase; }
  .hero-scroll .chev{ width:12px;height:12px; border-right:2px solid var(--blue2); border-bottom:2px solid var(--blue2); transform:rotate(45deg); animation:chevBounce 1.6s ease-in-out infinite; }
  @keyframes chevBounce{ 0%,100%{ transform:translateY(0) rotate(45deg); } 50%{ transform:translateY(7px) rotate(45deg); } }

  /* ================= GALLERY ================= */
  .pagegroup{ position:relative; }
  .pagegroup .tag{
    position:absolute; top:16px; inset-inline-start:16px; z-index:5;
    font-size:10.5px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
    color:rgba(255,255,255,.9);
    background:rgba(1,4,69,.55); border:1px solid rgba(255,255,255,.16);
    padding:6px 14px; border-radius:20px; backdrop-filter:blur(8px);
    opacity:0; transform:translateY(-8px);
    transition:opacity .6s ease, transform .6s ease;
  }
  .pagegroup .tag.in-view{ opacity:1; transform:translateY(0); }

  .shot{ display:block; width:100%; line-height:0; background:var(--navy); overflow:hidden; }
  .shot img{
    display:block; width:100%; height:auto;
    opacity:0;
    transform:translateY(50px) scale(1.035) perspective(800px) rotateX(2deg);
    filter:brightness(.92) saturate(1.02);
    transition:
      opacity 1s cubic-bezier(.16,1,.3,1),
      transform 1.15s cubic-bezier(.16,1,.3,1),
      filter 1s ease;
  }
  .shot img.in-view{
    opacity:1; transform:translateY(0) scale(1) perspective(800px) rotateX(0deg);
    filter:brightness(1) saturate(1);
  }
  .shot.first img{ transform:translateY(0) scale(1.04); }
  .shot.first img.in-view{ transform:translateY(0) scale(1); }

  /* ================= FLOATING BOXES (independent element motion) ================= */
  .floaty-shot{ position:relative; }
  .floaty-shot .floaty-bg{ position:relative; z-index:1; }
  .floaty-layer{ position:absolute; inset:0; z-index:2; pointer-events:none; opacity:0; transition:opacity .6s ease; }
  .floaty-layer.in-view{ opacity:1; }
  .fbox{
    position:absolute;
    left:var(--fx); top:var(--fy); width:var(--fw); height:auto;
    opacity:0;
    filter:drop-shadow(0 18px 26px rgba(1,4,69,.35));
    transform:translateY(30px) scale(.94);
    transition:opacity .9s cubic-bezier(.16,1,.3,1), transform .9s cubic-bezier(.16,1,.3,1);
  }
  .floaty-layer.in-view .fbox{ opacity:1; transform:translateY(0) scale(1); }
  .floaty-layer.in-view .fb-purple{ animation:floatA 6.5s ease-in-out .9s infinite; }
  .floaty-layer.in-view .fb-lime{ animation:floatB 5.5s ease-in-out 1.1s infinite; }
  .floaty-layer.in-view .fb-pink{ animation:floatC 7s ease-in-out 1.3s infinite; }
  @keyframes floatA{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(-16px) rotate(1.4deg); }
  }
  @keyframes floatB{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(14px) rotate(-2deg); }
  }
  @keyframes floatC{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(-12px) rotate(2.2deg); }
  }

  .page-seam{ height:30px; position:relative; background:linear-gradient(180deg, var(--navy), #000814 50%, var(--navy)); overflow:hidden; }
  .page-seam i{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%) scaleX(0);
    width:70px; height:2px;
    background:linear-gradient(90deg, transparent, var(--green), var(--blue2), transparent);
    transition:transform .8s cubic-bezier(.16,1,.3,1);
    transform-origin:center;
  }
  .page-seam.in-view i{ transform:translate(-50%,-50%) scaleX(1); }

  /* ================= FOOTER ================= */
  footer.site{ background:var(--navy); text-align:center; padding:50px 20px 38px; border-top:1px solid rgba(255,255,255,.08); }
  footer.site svg{ width:40px; height:auto; margin:0 auto 14px; opacity:.95; }
  footer.site .fbrand{ color:#fff; font-weight:800; font-size:16px; letter-spacing:.05em; margin-bottom:6px; }
  footer.site .ftag{ color:rgba(255,255,255,.45); font-size:12px; letter-spacing:.05em; }
  footer.site .fline{ width:40px; height:2px; background:linear-gradient(90deg,var(--blue2),var(--green)); margin:18px auto; border-radius:2px; }

  /* ================= BACK TO TOP ================= */
  .totop{
    position:fixed; bottom:20px; inset-inline-end:16px;
    width:46px;height:46px; border-radius:50%;
    background:rgba(2,11,254,.85); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; opacity:0; pointer-events:none;
    transition:opacity .3s ease, transform .3s ease;
    z-index:400; border:1px solid rgba(255,255,255,.25);
    box-shadow:0 8px 24px rgba(2,11,254,.4);
  }
  .totop.show{ opacity:1; pointer-events:auto; }
  .totop:active{ transform:scale(.9); }
  .totop svg{ width:18px;height:18px; }
</style>
</head>

<div id="loader">
  <div class="ld-inner">
    <div class="mark" id="loaderMark"></div>
    <div class="ld-bar"><div class="ld-fill" id="ldFill"></div></div>

  </div>
</div>

<div class="scrollbar"><i id="scrollFill"></i></div>

</section>

<main id="gallery"></main>

<footer class="site">

</footer>

<div class="totop" id="totop" title="العودة للأعلى">
  <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">

</div>

<script>

document.getElementById('loaderMark').innerHTML = MARK_SVG;
document.getElementById('heroMark').innerHTML = MARK_SVG;
document.getElementById('footerMark').innerHTML = MARK_SVG;

(function(){
  const PAGE_COUNTS = [8,9,11,11];
  const gallery = document.getElementById('gallery');

  PAGE_COUNTS.forEach((count, pIdx) => {
    const page = pIdx + 1;
    const group = document.createElement('div');
    group.className = 'pagegroup';
    group.id = 'page-' + page;

    const tag = document.createElement('div');
    tag.className = 'tag';
    tag.textContent = `صفحة ${page} / 4`;
    group.appendChild(tag);

    for(let i=1;i<=count;i++){

      if(page===1 && i===3){
        const shot = document.createElement('div');
        shot.className = 'shot floaty-shot';
        const bg = document.createElement('img');
        bg.className = 'floaty-bg';
        bg.src = 'images/p1_3_bg.jpg';
        bg.loading = 'lazy';
        bg.alt = 'Fabyab catalogue page 1';
        shot.appendChild(bg);

        const layer = document.createElement('div');
        layer.className = 'floaty-layer';
        [
          {cls:'fb-purple', src:'images/box_purple.png', x:108, y:871, w:400},
          {cls:'fb-lime',   src:'images/box_lime.png',   x:31,  y:1396, w:201},
          {cls:'fb-pink',   src:'images/box_pink.png',   x:462, y:1256, w:201},
        ].forEach(b=>{
          const bi = document.createElement('img');
          bi.className = 'fbox ' + b.cls;
          bi.src = b.src;
          bi.loading = 'lazy';
          bi.alt = '';
          bi.style.setProperty('--fx', (b.x/680*100)+'%');
          bi.style.setProperty('--fy', (b.y/2569*100)+'%');
          bi.style.setProperty('--fw', (b.w/680*100)+'%');
          layer.appendChild(bi);
        });
        shot.appendChild(layer);
        group.appendChild(shot);
        continue;
      }

      const shot = document.createElement('div');
      shot.className = 'shot' + (page===1 && i===1 ? ' first' : '');
      const img = document.createElement('img');
      img.src = `images/p${page}_${i}.jpg`;
      img.loading = (page===1 && i<=2) ? 'eager' : 'lazy';
      img.alt = `Fabyab catalogue page ${page}`;
      shot.appendChild(img);
      group.appendChild(shot);
    }
    gallery.appendChild(group);

    if(page < PAGE_COUNTS.length){
      const seam = document.createElement('div');
      seam.className = 'page-seam';
      seam.innerHTML = '<i></i>';
      gallery.appendChild(seam);
    }
  });

  const io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.add('in-view');
        io.unobserve(e.target);
      }
    });
  }, { threshold:0.1, rootMargin:'0px 0px -8% 0px' });
  document.querySelectorAll('.shot img, .pagegroup .tag, .page-seam, .floaty-layer').forEach(el=>io.observe(el));

  requestAnimationFrame(()=>{
    const firstImg = document.querySelector('.shot.first img');
    if(firstImg){ setTimeout(()=> firstImg.classList.add('in-view'), 150); }
  });

  const header = document.getElementById('siteHeader');
  const scrollFill = document.getElementById('scrollFill');
  const totop = document.getElementById('totop');
  const navdots = document.querySelectorAll('#navdots span');
  const pageEls = PAGE_COUNTS.map((_,i)=> document.getElementById('page-'+(i+1)));
  const heroEl = document.getElementById('hero');

  function onScroll(){
    const h = document.documentElement;
    const scrolled = h.scrollTop / (h.scrollHeight - h.clientHeight) * 100;
    scrollFill.style.width = (isFinite(scrolled)?scrolled:0) + '%';
    totop.classList.toggle('show', h.scrollTop > 700);
    header.classList.toggle('solid', heroEl.getBoundingClientRect().bottom < 80);

    let activeIdx = 0;
    pageEls.forEach((el,i)=>{
      if(el && el.getBoundingClientRect().top <= window.innerHeight*0.4) activeIdx = i;
    });
    navdots.forEach((d,i)=> d.classList.toggle('on', i===activeIdx));
  }
  document.addEventListener('scroll', onScroll, { passive:true });
  onScroll();

  navdots.forEach(d=>{
    d.addEventListener('click', ()=>{
      const p = d.getAttribute('data-p');
      document.getElementById('page-'+p).scrollIntoView({behavior:'smooth', block:'start'});
    });
  });
  totop.addEventListener('click', ()=> window.scrollTo({top:0, behavior:'smooth'}));

  const ldFill = document.getElementById('ldFill');
  const ldPct = document.getElementById('ldPct');
  let lp = 0;
  const li = setInterval(()=>{
    lp += Math.random()*10+4;
    if(lp >= 100){
      lp = 100;
      clearInterval(li);
      setTimeout(()=>{ document.getElementById('loader').classList.add('hide'); }, 280);
    }
    ldFill.style.width = lp + '%';
    ldPct.textContent = Math.round(lp) + '%';
  }, 90);
})();
</script>

</body>
</html>
